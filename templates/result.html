<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>

    <style>

    body{
        font-family:Arial;
        background:linear-gradient(135deg,#84fab0,#8fd3f4);
        text-align:center;
        padding-top:60px;
    }

    .box{
        background:white;
        width:500px;
        margin:auto;
        padding:30px;
        border-radius:20px;
        box-shadow:0px 8px 20px rgba(0,0,0,0.2);
    }

    button{
        background:#2196F3;
        color:white;
        border:none;
        padding:12px 25px;
        border-radius:8px;
        cursor:pointer;
    }

    </style>

</head>

<body>

<div class="box">

<h1>🍽 Food Prediction Result</h1>

<hr>

<h2>Food: {{ food }}</h2>

<h2>Quantity: {{ quantity }}</h2>

<h2>🔥 Calories: {{ calories }} kcal</h2>

<h2>📊 Confidence: {{ confidence }}%</h2>

<br>

<a href="/">
    <button>Try Another Image</button>
</a>

</div>

</body>
</html>
