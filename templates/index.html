<!DOCTYPE html>

<html>

<head>

<title>Food Calorie Detection</title>


<style>

body{

font-family:Arial;

background:linear-gradient(135deg,#84fab0,#8fd3f4);

text-align:center;

padding-top:60px;

}


.container{

background:white;

width:500px;

margin:auto;

padding:30px;

border-radius:20px;

box-shadow:0px 8px 20px rgba(0,0,0,0.2);

}


button{

background:#2196F3;

color:white;

border:none;

padding:12px 25px;

border-radius:8px;

font-size:16px;

cursor:pointer;

}


input{

padding:10px;

margin:10px;

}


</style>


</head>



<body>


<div class="container">


<h1>🍽 Food Calorie Detector</h1>

<hr>


<form action="/predict" method="POST" enctype="multipart/form-data">


<h3>Select Food Image</h3>


<input type="file" name="image">


<br>


<h3>Quantity</h3>


<input type="number" name="quantity" value="1" min="1">


<br><br>


<button type="submit">
Predict Calories
</button>


</form>


</div>


</body>


</html>
